<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Theme colour (gold — matches ExamAce brand) -->
    <meta name="theme-color" content="#f5c842" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ExamAce AI" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- SEO -->
    <meta name="description" content="Nigeria's #1 AI-powered WAEC, NECO and JAMB exam preparation app. Real past questions, CBT simulation, AI tutoring, gamification." />
    <meta name="keywords" content="WAEC, NECO, JAMB, UTME, CBT, past questions, Nigeria, exam prep, AI tutor" />
    <meta name="author" content="ExamAce AI" />

    <!-- Open Graph (WhatsApp/social share preview) -->
    <meta property="og:title" content="ExamAce AI — WAEC NECO JAMB Tutor" />
    <meta property="og:description" content="Nigeria's #1 AI-powered exam prep app. Real past questions, CBT simulation, AI tutoring." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/icons/icon-512.png" />

    <title>ExamAce AI — WAEC · NECO · JAMB</title>

    <style>
      /* Prevent flash of white before React loads */
      body {
        background-color: #0b0d14;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Loading spinner shown before React mounts */
      #root:empty::after {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        border: 3px solid #252838;
        border-top-color: #f5c842;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 40vh auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>ExamAce AI requires JavaScript. Please enable it in your browser.</noscript>
    <div id="root"></div>
  </body>
</html>
